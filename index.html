<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seesaw Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>Seesaw Simulation</h1>

    <div class="info">
      <span>Left Weight: <strong id="left-weight">0</strong> kg</span>
      <span>Right Weight: <strong id="right-weight">0</strong> kg</span>
    </div>

    <div class="scene">
      <div class="seesaw-wrapper" id="seesaw-wrapper">
        <div class="plank" id="plank"></div>
        <div class="pivot"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
